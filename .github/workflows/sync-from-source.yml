name: Sync from oh-my-codex Source

on:
  schedule:
    # Run every hour to check for updates
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: Yeachan-Heo/oh-my-codex
          path: oh-my-codex-source
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync docs from source
        run: |
          # Copy all docs from source repo
          cp -r oh-my-codex-source/docs/* docs/
          # Keep website post-publish corrections that intentionally supersede
          # stale pre-publication source collateral until the source catches up.
          git checkout -- docs/qa/release-readiness-0.17.0.md

      - name: Sync version
        env:
          OMX_SOURCE_PACKAGE_JSON: ${{ github.workspace }}/oh-my-codex-source/package.json
        run: |
          node scripts/sync-version.mjs

      - name: Check for changes
        id: check
        run: |
          # Check for changes, excluding the source checkout directory
          git add docs/ data/ js/ index.html scripts/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Commit and push changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "site: auto-sync from oh-my-codex source ($(date +%Y-%m-%d))"
          git push
