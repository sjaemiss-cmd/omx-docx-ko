name: Sync Stats from npm/GitHub

on:
  schedule:
    # Run every 6 hours to keep stats fresh
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch npm downloads
        id: npm
        run: |
          DOWNLOADS=$(curl -s "https://api.npmjs.org/downloads/point/last-month/oh-my-codex" | jq -r '.downloads // 0')
          echo "downloads=$DOWNLOADS" >> $GITHUB_OUTPUT
          echo "NPM downloads (last month): $DOWNLOADS"

      - name: Fetch GitHub stars
        id: github
        run: |
          STARS=$(curl -s "https://api.github.com/repos/Yeachan-Heo/oh-my-codex" | jq -r '.stargazers_count // 0')
          echo "stars=$STARS" >> $GITHUB_OUTPUT
          echo "GitHub stars: $STARS"

      - name: Update stats.json
        run: |
          node -e "
          const fs = require('fs');
          const path = 'data/stats.json';
          const stats = JSON.parse(fs.readFileSync(path, 'utf8'));

          stats.downloads = ${{ steps.npm.outputs.downloads }};
          stats.stars = ${{ steps.github.outputs.stars }};
          stats.lastUpdated = new Date().toISOString();

          fs.writeFileSync(path, JSON.stringify(stats, null, 2));
          console.log('Updated stats.json:', stats);
          "

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json
          git commit -m "site: auto-sync stats (downloads: ${{ steps.npm.outputs.downloads }}, stars: ${{ steps.github.outputs.stars }})"
          git push
